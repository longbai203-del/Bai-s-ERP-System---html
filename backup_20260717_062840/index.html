                <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAI ERP - 智能企业管理系统</title>
</head>
<body>
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;color:#666;">
        加载中...
    </div>

    <script>
        // ============================================================
        // 登录状态检查（所有逻辑都在函数内，避免 illegal return）
        // ============================================================
        (function checkAuth() {
            try {
                const user = localStorage.getItem('sb-user');
                
                if (user) {
                    try {
                        const parsed = JSON.parse(user);
                        if (parsed && parsed.access_token) {
                            // 有有效 token，跳转到仪表盘
                            window.location.href = '/dashboard.html';
                            return;  // ✅ 在函数内部，合法
                        }
                    } catch (e) {
                        // 解析失败，清除无效数据
                        localStorage.removeItem('sb-user');
                    }
                }
                
                // 没有有效 session，跳转到登录页
                window.location.href = '/login.html';
                
            } catch (err) {
                console.warn('认证检查失败:', err);
                window.location.href = '/login.html';
            }
        })();
    </script>
</body>
</html>

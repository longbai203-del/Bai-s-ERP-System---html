<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAI ERP - 智能企业管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            padding: 1rem;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 420px;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo .logo-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .login-logo h1 {
            color: #1a202c;
            font-size: 2rem;
            font-weight: 700;
        }

        .login-logo h1 span {
            color: #4299e1;
            background: linear-gradient(135deg, #4299e1, #2b6cb0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-logo p {
            color: #718096;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .login-subtitle {
            text-align: center;
            color: #a0aec0;
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #edf2f7;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #2d3748;
            font-size: 0.875rem;
            letter-spacing: 0.3px;
        }

        .form-group label .required {
            color: #e53e3e;
            margin-left: 2px;
        }

        .form-group .input-wrapper {
            position: relative;
        }

        .form-group .input-wrapper .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            color: #a0aec0;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.8rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f7fafc;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 4px rgba(66, 153, 225, 0.15);
            background: white;
        }

        .form-group input::placeholder {
            color: #a0aec0;
        }

        .form-group input.error {
            border-color: #e53e3e;
            box-shadow: 0 0 0 4px rgba(229, 62, 62, 0.1);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
        }

        .form-options label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #4a5568;
            cursor: pointer;
        }

        .form-options label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #4299e1;
            cursor: pointer;
        }

        .form-options a {
            color: #4299e1;
            text-decoration: none;
            transition: color 0.2s;
        }

        .form-options a:hover {
            color: #2b6cb0;
            text-decoration: underline;
        }

        .btn-primary {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #4299e1, #3182ce);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(66, 153, 225, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary .btn-loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        .btn-primary.loading .btn-loader {
            display: block;
        }

        .btn-primary.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-message {
            color: #e53e3e;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
            background: #fff5f5;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border-left: 4px solid #e53e3e;
            align-items: center;
            gap: 0.5rem;
        }

        .error-message.visible {
            display: flex;
        }

        .error-message .error-icon {
            font-size: 1.2rem;
        }

        .success-message {
            color: #38a169;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
            background: #f0fff4;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border-left: 4px solid #38a169;
            align-items: center;
            gap: 0.5rem;
        }

        .success-message.visible {
            display: flex;
        }

        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #edf2f7;
            color: #a0aec0;
            font-size: 0.8rem;
        }

        .login-footer .footer-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 0.5rem;
        }

        .login-footer .footer-links a {
            color: #a0aec0;
            text-decoration: none;
            transition: color 0.2s;
        }

        .login-footer .footer-links a:hover {
            color: #4299e1;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .login-container {
                padding: 1.5rem 1rem;
            }

            .login-logo h1 {
                font-size: 1.5rem;
            }

            .form-options {
                flex-direction: column;
                gap: 0.5rem;
                align-items: flex-start;
            }
        }

        /* 密码可见切换 */
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #a0aec0;
            font-size: 1.1rem;
            padding: 0.25rem;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: #4a5568;
        }

        /* 版本号 */
        .version-badge {
            display: inline-block;
            background: #edf2f7;
            color: #4a5568;
            font-size: 0.7rem;
            padding: 0.15rem 0.6rem;
            border-radius: 20px;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-logo">
            <span class="logo-icon">🚗</span>
            <h1><span>BAI</span> ERP</h1>
            <p>智能洗车 · 企业管理平台</p>
            <span class="version-badge">v1.0.0</span>
        </div>

        <div class="login-subtitle">
            登录以继续使用系统
        </div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="email">
                    邮箱地址
                    <span class="required">*</span>
                </label>
                <div class="input-wrapper">
                    <span class="input-icon">📧</span>
                    <input
                    type="email"
                    id="email"
                    placeholder="请输入您的邮箱"
                    required
                    autocomplete="email"
                    autofocus
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="password">
                    密码
                    <span class="required">*</span>
                </label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input
                    type="password"
                    id="password"
                    placeholder="请输入您的密码"
                    required
                    autocomplete="current-password"
                    >
                    <button type="button" class="toggle-password" id="togglePassword" aria-label="切换密码可见性">
                        👁️
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label>
                    <input type="checkbox" id="rememberMe">
                    记住我
                </label>
                <a href="#" id="forgotPassword">忘记密码？</a>
            </div>

            <div id="errorMessage" class="error-message">
                <span class="error-icon">❌</span>
                <span id="errorText">错误信息</span>
            </div>

            <div id="successMessage" class="success-message">
                <span>✅</span>
                <span id="successText">登录成功！正在跳转...</span>
            </div>

            <button type="submit" class="btn-primary" id="loginBtn">
                <span class="btn-text">登 录</span>
                <span class="btn-loader"></span>
            </button>
        </form>

        <div class="login-footer">
            <p>© 2026 BAI ERP · 基于 Supabase</p>
            <div class="footer-links">
                <a href="#">隐私政策</a>
                <a href="#">服务条款</a>
                <a href="#">帮助中心</a>
            </div>
        </div>
    </div>

    <!-- Supabase Import Map -->
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
            }
        }
    </script>

    <script type="module">
        // ============================================================
        // 1. 导入依赖
        // ============================================================
        import { createClient } from '@supabase/supabase-js';

        // ============================================================
        // 2. Supabase 配置（请替换为您的实际值）
        // ============================================================
        const SUPABASE_URL = 'https://your-project.supabase.co';
        const SUPABASE_ANON_KEY = 'your-anon-key';

        // ============================================================
        // 3. 初始化 Supabase 客户端
        // ============================================================
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // 4. DOM 元素引用
        // ============================================================
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successDiv = document.getElementById('successMessage');
        const successText = document.getElementById('successText');
        const loginBtn = document.getElementById('loginBtn');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const rememberMeCheckbox = document.getElementById('rememberMe');

        // ============================================================
        // 5. 工具函数
        // ============================================================

        // 显示错误信息
        function showError(message) {
            errorText.textContent = message;
            errorDiv.classList.add('visible');
            successDiv.classList.remove('visible');
        }

        // 隐藏错误信息
        function hideError() {
            errorDiv.classList.remove('visible');
        }

        // 显示成功信息
        function showSuccess(message) {
            successText.textContent = message;
            successDiv.classList.add('visible');
            errorDiv.classList.remove('visible');
        }

        // 设置按钮加载状态
        function setLoading(loading) {
            if (loading) {
                loginBtn.classList.add('loading');
                loginBtn.disabled = true;
            } else {
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        }

        // 验证邮箱格式
        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // ============================================================
        // 6. 检查是否已登录
        // ============================================================
        async function checkExistingSession() {
            try {
                const { data, error } = await supabase.auth.getSession();
                if (error) {
                    console.warn('获取会话失败:', error.message);
                    return;
                }

                if (data?.session) {
                    // 已登录，跳转到 dashboard
                    showSuccess('已检测到有效会话，正在跳转...');
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 800);
                    return true;
                }

                // 检查本地存储是否有用户信息（兼容旧版本）
                const localUser = localStorage.getItem('sb-user');
                if (localUser) {
                    try {
                        const parsed = JSON.parse(localUser);
                        if (parsed?.access_token) {
                            showSuccess('检测到本地登录信息，正在跳转...');
                            setTimeout(() => {
                                window.location.href = '/dashboard.html';
                            }, 800);
                            return true;
                        }
                    } catch (e) {
                        // 忽略解析错误
                        localStorage.removeItem('sb-user');
                    }
                }

                return false;
            } catch (err) {
                console.warn('检查会话时出错:', err);
                return false;
            }
        }

        // ============================================================
        // 7. 登录处理函数
        // ============================================================
        async function handleLogin(email, password) {
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email.trim(),
                    password: password
                });

                if (error) {
                    // 处理特定错误
                    if (error.message.includes('Invalid login credentials')) {
                        showError('邮箱或密码错误，请重新输入');
                    } else if (error.message.includes('Email not confirmed')) {
                        showError('邮箱尚未验证，请查收验证邮件');
                    } else if (error.message.includes('Too many requests')) {
                        showError('请求过于频繁，请稍后再试');
                    } else {
                        showError(error.message || '登录失败，请稍后重试');
                    }
                    return false;
                }

                if (data?.user) {
                    // 登录成功
                    const userData = {
                        id: data.user.id,
                        email: data.user.email,
                        access_token: data.session?.access_token,
                        refresh_token: data.session?.refresh_token,
                        expires_at: data.session?.expires_at
                    };

                    // 如果勾选了"记住我"，保存到 localStorage
                    if (rememberMeCheckbox.checked) {
                        localStorage.setItem('sb-user', JSON.stringify(userData));
                    } else {
                        // 否则只保存 session，不持久化
                        sessionStorage.setItem('sb-user', JSON.stringify(userData));
                    }

                    showSuccess('登录成功！正在跳转...');
                    setLoading(true);

                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 800);

                    return true;
                }

                showError('登录失败，请稍后重试');
                return false;
            } catch (err) {
                console.error('登录异常:', err);
                showError('网络异常，请检查网络连接后重试');
                return false;
            }
        }

        // ============================================================
        // 8. 表单提交事件
        // ============================================================
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            // 获取并验证邮箱
            const email = emailInput.value.trim();
            if (!email) {
                showError('请输入邮箱地址');
                emailInput.focus();
                emailInput.classList.add('error');
                return;
            }

            if (!isValidEmail(email)) {
                showError('请输入有效的邮箱地址（例如：user@example.com）');
                emailInput.focus();
                emailInput.classList.add('error');
                return;
            }
            emailInput.classList.remove('error');

            // 获取并验证密码
            const password = passwordInput.value;
            if (!password) {
                showError('请输入密码');
                passwordInput.focus();
                passwordInput.classList.add('error');
                return;
            }

            if (password.length < 6) {
                showError('密码长度不能少于6位');
                passwordInput.focus();
                passwordInput.classList.add('error');
                return;
            }
            passwordInput.classList.remove('error');

            // 执行登录
            setLoading(true);
            await handleLogin(email, password);
            setLoading(false);
        });

        // ============================================================
        // 9. 输入框实时错误清除
        // ============================================================
        emailInput.addEventListener('input', () => {
            emailInput.classList.remove('error');
            hideError();
        });

        passwordInput.addEventListener('input', () => {
            passwordInput.classList.remove('error');
            hideError();
        });

        // ============================================================
        // 10. 密码可见切换
        // ============================================================
        togglePasswordBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePasswordBtn.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
        });

        // ============================================================
        // 11. 忘记密码功能
        // ============================================================
        document.getElementById('forgotPassword').addEventListener('click', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            if (!email || !isValidEmail(email)) {
                showError('请先输入有效的邮箱地址，以便接收重置链接');
                emailInput.focus();
                return;
            }

            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/reset-password.html'
                });

                if (error) {
                    showError(error.message || '发送重置邮件失败');
                    return;
                }

                showSuccess('密码重置链接已发送到您的邮箱，请查收');
            } catch (err) {
                showError('发送重置邮件失败，请稍后重试');
            }
        });

        // ============================================================
        // 12. 回车键自动提交
        // ============================================================
        [emailInput, passwordInput].forEach(input => {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    form.dispatchEvent(new Event('submit'));
                }
            });
        });

        // ============================================================
        // 13. 初始化
        // ============================================================
        async function init() {
            // 检查是否已登录
            const hasSession = await checkExistingSession();
            if (hasSession) {
                // 如果有会话，禁用表单
                form.querySelectorAll('input, button').forEach(el => el.disabled = true);
                return;
            }

            // 尝试从 localStorage 恢复邮箱（用户友好）
            const savedEmail = localStorage.getItem('saved-email');
            if (savedEmail) {
                emailInput.value = savedEmail;
                rememberMeCheckbox.checked = true;
            }
        }

        // 启动
        init();

        // ============================================================
        // 14. 控制台帮助信息（调试用）
        // ============================================================
        console.log('%c🚗 BAI ERP 登录页面已加载', 'font-size:16px;font-weight:bold;color:#4299e1;');
        console.log('%c💡 提示：请确保已配置正确的 Supabase URL 和 Anon Key', 'color:#718096;');
        console.log(`%c📌 SUPABASE_URL: ${SUPABASE_URL}`, 'color:#718096;');
        console.log(`%c📌 SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY.substring(0, 10)}...`, 'color:#718096;');

        // ============================================================
        // 15. 暴露调试对象到 window（可选）
        // ============================================================
        window.__supabase = supabase;
        window.__loginDebug = {
            email: () => emailInput.value,
            password: () => passwordInput.value,
            login: handleLogin
        };

        console.log('%c🔧 调试工具: window.__loginDebug', 'color:#38a169;');
    </script>

</body>
</html>

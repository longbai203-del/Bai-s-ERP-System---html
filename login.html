<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - BAI ERP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f4f8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }
        .login-container {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .login-logo { text-align: center; margin-bottom: 2rem; }
        .login-logo h1 { color: #1a202c; font-size: 2rem; }
        .login-logo h1 span { color: #4299e1; }
        .login-logo p { color: #718096; font-size: 0.9rem; margin-top: 0.25rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #2d3748;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66,153,225,0.2);
        }
        .btn-primary {
            width: 100%;
            padding: 0.75rem;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #3182ce; }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
        .error-message {
            color: #e53e3e;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
            background: #fff5f5;
            padding: 0.5rem;
            border-radius: 4px;
        }
        .error-message.visible { display: block; }
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #a0aec0;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <h1>🚗 <span>BAI</span> ERP</h1>
            <p>智能洗车 · 企业管理平台</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">邮箱地址</label>
                <input type="email" id="email" placeholder="admin@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>
            <div id="errorMessage" class="error-message"></div>
            <button type="submit" class="btn-primary" id="loginBtn">登 录</button>
        </form>
        <div class="login-footer">
            © 2026 BAI ERP · 基于 Supabase
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
            }
        }
    </script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';

        // Supabase 配置（请替换为您的实际配置）
        const SUPABASE_URL = 'https://your-project.supabase.co';
        const SUPABASE_ANON_KEY = 'your-anon-key';
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorDiv = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');

        // 如果已登录，直接跳转
        const session = await supabase.auth.getSession();
        if (session.data.session) {
            window.location.href = '/dashboard.html';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.classList.remove('visible');
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) {
                    errorDiv.textContent = error.message;
                    errorDiv.classList.add('visible');
                } else if (data?.user) {
                    localStorage.setItem('sb-user', JSON.stringify({
                        id: data.user.id,
                        email: data.user.email,
                        access_token: data.session?.access_token
                    }));
                    window.location.href = '/dashboard.html';
                }
            } catch (err) {
                errorDiv.textContent = '网络错误，请稍后重试';
                errorDiv.classList.add('visible');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '登 录';
            }
        });
    </script>
</body>
</html>

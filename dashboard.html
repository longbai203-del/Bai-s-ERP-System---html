<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - BAI ERP</title>
    <style>
        /* ============================================================
           全局样式
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f7fafc;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* ============================================================
           侧边栏
           ============================================================ */
        .sidebar {
            width: 280px;
            background: #1a202c;
            color: #a0aec0;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: sticky;
            top: 0;
            transition: width 0.3s ease;
            overflow: hidden;
            z-index: 100;
        }

        .sidebar-brand {
            padding: 1.25rem 1.5rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: white;
            border-bottom: 1px solid #2d3748;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
            min-height: 64px;
        }

        .sidebar-brand span {
            background: linear-gradient(135deg, #4299e1, #2b6cb0);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        .sidebar-brand .brand-badge {
            font-size: 0.6rem;
            background: #2b6cb0;
            color: white;
            padding: 0.1rem 0.5rem;
            border-radius: 10px;
            margin-left: auto;
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0;
        }

        .sidebar-nav::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar-nav::-webkit-scrollbar-thumb {
            background: #4a5568;
            border-radius: 2px;
        }
        .sidebar-nav::-webkit-scrollbar-track {
            background: transparent;
        }

        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu-item {
            margin: 0;
        }

        .menu-link {
            display: flex;
            align-items: center;
            padding: 0.6rem 1.2rem;
            color: #a0aec0;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            gap: 0.75rem;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-size: 0.9rem;
            position: relative;
        }

        .menu-link:hover {
            background: #2d3748;
            color: white;
        }

        .menu-link.active {
            background: #2b6cb0;
            color: white;
        }

        .menu-link .menu-icon {
            font-size: 1.1rem;
            width: 24px;
            flex-shrink: 0;
            text-align: center;
        }

        .menu-link .menu-label {
            flex: 1;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .menu-link .menu-arrow {
            font-size: 0.65rem;
            transition: transform 0.3s ease;
            flex-shrink: 0;
            margin-left: auto;
        }

        .menu-link .menu-arrow.open {
            transform: rotate(180deg);
        }

        .sub-menu {
            list-style: none;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
            background: #0d1117;
        }

        .sub-menu.open {
            max-height: 2000px;
        }

        .sub-menu-link {
            display: block;
            padding: 0.4rem 1.2rem 0.4rem 3.2rem;
            color: #a0aec0;
            text-decoration: none;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            position: relative;
        }

        .sub-menu-link::before {
            content: '›';
            position: absolute;
            left: 2.4rem;
            opacity: 0.5;
            font-size: 1.2rem;
        }

        .sub-menu-link:hover {
            color: white;
            background: #1a202c;
        }

        .sub-menu-link.active {
            color: #63b3ed;
            background: #1a202c;
        }

        .sidebar-collapsed .sidebar {
            width: 64px;
        }

        .sidebar-collapsed .sidebar-brand span,
        .sidebar-collapsed .sidebar-brand .brand-badge,
        .sidebar-collapsed .menu-label,
        .sidebar-collapsed .menu-arrow,
        .sidebar-collapsed .sub-menu {
            display: none;
        }

        .sidebar-collapsed .menu-link {
            justify-content: center;
            padding: 0.7rem 0;
        }

        .sidebar-collapsed .menu-link .menu-icon {
            font-size: 1.3rem;
            width: auto;
        }

        .sidebar-collapsed .sidebar-nav {
            overflow-x: hidden;
        }

        /* ============================================================
           主内容
           ============================================================ */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            height: 100vh;
            overflow: hidden;
        }

        .topbar {
            background: white;
            padding: 0.6rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
            min-height: 56px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .topbar-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #4a5568;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .topbar-btn:hover {
            background: #f7fafc;
        }

        .topbar-title {
            font-size: 1.1rem;
            color: #2d3748;
            font-weight: 600;
        }

        .topbar-title .title-path {
            font-size: 0.75rem;
            color: #a0aec0;
            font-weight: 400;
            margin-left: 0.5rem;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-name {
            font-size: 0.9rem;
            color: #4a5568;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #4299e1;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .logout-btn {
            color: #e53e3e;
            font-size: 0.85rem;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: #fff5f5;
        }

        .page-content {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            background: #f7fafc;
        }

        .page-content::-webkit-scrollbar {
            width: 6px;
        }
        .page-content::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 3px;
        }

        .loading-spinner {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 60vh;
            color: #a0aec0;
            font-size: 1.1rem;
            gap: 1rem;
        }

        .loading-spinner .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top-color: #4299e1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 子模块卡片 */
        .submodule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .submodule-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.2rem;
            background: white;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .submodule-card:hover {
            border-color: #4299e1;
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(66, 153, 225, 0.15);
        }

        .submodule-card .submodule-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .submodule-card .submodule-info {
            flex: 1;
        }

        .submodule-card .submodule-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: #1a202c;
        }

        .submodule-card .submodule-path {
            font-size: 0.75rem;
            color: #a0aec0;
            font-family: monospace;
        }

        .submodule-card .submodule-arrow {
            color: #a0aec0;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .submodule-card:hover .submodule-arrow {
            transform: translateX(4px);
            color: #4299e1;
        }

        .module-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #e2e8f0;
        }

        .module-header .module-icon {
            font-size: 2.5rem;
        }

        .module-header h1 {
            font-size: 1.5rem;
            color: #1a202c;
            margin: 0;
        }

        .module-header p {
            color: #718096;
            margin: 0;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 64px;
            }
            .sidebar-brand span,
            .sidebar-brand .brand-badge,
            .menu-label,
            .menu-arrow,
            .sub-menu {
                display: none;
            }
            .menu-link {
                justify-content: center;
                padding: 0.7rem 0;
            }
            .menu-link .menu-icon {
                font-size: 1.3rem;
                width: auto;
            }
            .topbar-title .title-path {
                display: none;
            }
            .user-name {
                display: none;
            }
            .submodule-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .topbar {
                padding: 0.4rem 0.8rem;
            }
            .page-content {
                padding: 0.8rem;
            }
            .topbar-title {
                font-size: 0.9rem;
            }
            .module-header h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div id="app" class="app-container">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-brand">
                🚗 <span>BAI</span>
                <span class="brand-badge">v1.0</span>
            </div>
            <nav id="sidebarNav" class="sidebar-nav"></nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-left">
                    <button id="toggleSidebar" class="topbar-btn" title="切换侧边栏">☰</button>
                    <span class="topbar-title" id="pageTitle">
                        仪表盘
                        <span class="title-path" id="pagePath">/dashboard</span>
                    </span>
                </div>
                <div class="topbar-right">
                    <span class="user-name" id="userDisplay">管理员</span>
                    <div class="user-avatar" id="userAvatar">管</div>
                    <button id="logoutBtn" class="logout-btn">退出</button>
                </div>
            </header>

            <section id="pageContent" class="page-content">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    加载中...
                </div>
            </section>
        </main>
    </div>

    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
            }
        }
    </script>

    <script type="module">
        // ============================================================
        // 1. 导入
        // ============================================================
        import { createClient } from '@supabase/supabase-js';
        import { MENU_CONFIG, findMenuItemByPath, getLabelByPath } from './config/menu.config.js';

        // ============================================================
        // 2. Supabase 配置
        // ============================================================
        const SUPABASE_URL = 'https://sthrubrefavbomjlobew.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN0aHJ1YnJlZmF2Ym9tamxvYmV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMzM4MzksImV4cCI6MjA5OTcwOTgzOX0.LtBBe_QWq_5WXwVw7ELIQJuy9M7fzHd-R6VTMVkXqyg';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // 3. DOM 引用
        // ============================================================
        const sidebarNav = document.getElementById('sidebarNav');
        const pageContent = document.getElementById('pageContent');
        const pageTitle = document.getElementById('pageTitle');
        const pagePath = document.getElementById('pagePath');

        // ============================================================
        // 4. 认证检查
        // ============================================================
        async function checkAuth() {
            try {
                const { data, error } = await supabase.auth.getSession();
                if (error || !data?.session) {
                    const localUser = localStorage.getItem('sb-user');
                    if (!localUser) {
                        window.location.href = '/login.html';
                        return null;
                    }
                    try {
                        const parsed = JSON.parse(localUser);
                        if (!parsed?.access_token) {
                            window.location.href = '/login.html';
                            return null;
                        }
                        return parsed;
                    } catch (e) {
                        window.location.href = '/login.html';
                        return null;
                    }
                }
                return data.session.user;
            } catch (err) {
                console.error('认证失败:', err);
                window.location.href = '/login.html';
                return null;
            }
        }

        // ============================================================
        // 5. 渲染侧边栏
        // ============================================================
        function renderSidebar(activePath) {
            let html = '<ul class="menu-list">';

            MENU_CONFIG.forEach((item) => {
                const hasChildren = item.children && item.children.length > 0;
                const isActive = activePath && activePath.startsWith(item.path);
                const isOpen = isActive;

                html += `<li class="menu-item">`;
                html += `<button class="menu-link" data-path="${item.path}" data-module="${item.modulePath}" data-is-main="true">`;
                html += `<span class="menu-icon">${item.icon}</span>`;
                html += `<span class="menu-label">${item.label}</span>`;
                if (hasChildren) {
                    html += `<span class="menu-arrow ${isOpen ? 'open' : ''}">▾</span>`;
                }
                html += `</button>`;

                if (hasChildren) {
                    html += `<ul class="sub-menu ${isOpen ? 'open' : ''}">`;
                    item.children.forEach((child) => {
                        const isChildActive = activePath === child.path;
                        html += `<li>`;
                        html += `<button class="sub-menu-link ${isChildActive ? 'active' : ''}" data-path="${child.path}" data-file="${child.file}" data-module="${item.modulePath}">`;
                        html += child.label;
                        html += `</button>`;
                        html += `</li>`;
                    });
                    html += `</ul>`;
                }

                html += `</li>`;
            });

            html += '</ul>';
            sidebarNav.innerHTML = html;

            // 主菜单点击事件
            sidebarNav.querySelectorAll('.menu-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const path = this.dataset.path;
                    const modulePath = this.dataset.module;
                    const parentItem = this.closest('.menu-item');
                    const subMenu = parentItem.querySelector('.sub-menu');
                    const arrow = this.querySelector('.menu-arrow');

                    if (subMenu) {
                        const isOpen = subMenu.classList.contains('open');
                        if (isOpen) {
                            subMenu.classList.remove('open');
                            if (arrow) arrow.classList.remove('open');
                        } else {
                            subMenu.classList.add('open');
                            if (arrow) arrow.classList.add('open');
                        }
                        sidebarNav.querySelectorAll('.menu-link').forEach(el => el.classList.remove('active'));
                        this.classList.add('active');
                        loadModule(path, modulePath);
                    } else {
                        sidebarNav.querySelectorAll('.menu-link').forEach(el => el.classList.remove('active'));
                        this.classList.add('active');
                        loadModule(path, modulePath);
                    }
                });
            });

            // 子菜单点击事件
            sidebarNav.querySelectorAll('.sub-menu-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const path = this.dataset.path;
                    const file = this.dataset.file;
                    const modulePath = this.dataset.module;

                    sidebarNav.querySelectorAll('.sub-menu-link').forEach(el => el.classList.remove('active'));
                    this.classList.add('active');

                    const parentItem = this.closest('.menu-item');
                    const subMenu = parentItem.querySelector('.sub-menu');
                    const arrow = parentItem.querySelector('.menu-arrow');
                    if (subMenu) subMenu.classList.add('open');
                    if (arrow) arrow.classList.add('open');

                    loadModule(path, modulePath, file);
                });
            });

            if (activePath) {
                highlightMenu(activePath);
            }
        }

        // ============================================================
        // 6. 高亮菜单
        // ============================================================
        function highlightMenu(path) {
            sidebarNav.querySelectorAll('.menu-link, .sub-menu-link').forEach(el => el.classList.remove('active'));

            let found = false;
            sidebarNav.querySelectorAll('.sub-menu-link').forEach(link => {
                if (link.dataset.path === path) {
                    link.classList.add('active');
                    const parentItem = link.closest('.menu-item');
                    const subMenu = parentItem.querySelector('.sub-menu');
                    const arrow = parentItem.querySelector('.menu-arrow');
                    if (subMenu) subMenu.classList.add('open');
                    if (arrow) arrow.classList.add('open');
                    const mainLink = parentItem.querySelector('.menu-link');
                    if (mainLink) mainLink.classList.add('active');
                    found = true;
                }
            });

            if (!found) {
                sidebarNav.querySelectorAll('.menu-link').forEach(link => {
                    if (link.dataset.path === path) {
                        link.classList.add('active');
                    }
                });
            }
        }

        // ============================================================
        // 7. 加载模块
        // ============================================================
        async function loadModule(path, modulePath, file) {
            const label = getLabelByPath(path);
            pageTitle.textContent = label || path;
            pagePath.textContent = path;

            pageContent.innerHTML = `
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    加载 ${label || '模块'}...
                </div>
            `;

            try {
                let filePath;
                if (file) {
                    filePath = `/modules/${modulePath}/${file}`;
                } else {
                    // 主模块：尝试加载 index.html
                    filePath = `/modules/${modulePath}/index.html`;
                }

                const response = await fetch(filePath);

                if (!response.ok) {
                    // 如果文件不存在，显示子模块列表
                    const menuItem = findMenuItemByPath(path);
                    if (!file && menuItem && menuItem.children && menuItem.children.length > 0) {
                        renderModuleIndex(menuItem);
                        return;
                    }
                    pageContent.innerHTML = `
                        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:1rem;">
                            <span style="font-size:4rem;">📄</span>
                            <h2 style="color:#e53e3e;">模块不存在</h2>
                            <p style="color:#718096;">${filePath}</p>
                            <button onclick="location.reload()" style="padding:0.5rem 1.5rem;background:#4299e1;color:white;border:none;border-radius:8px;cursor:pointer;">
                                刷新
                            </button>
                        </div>
                    `;
                    return;
                }

                const html = await response.text();
                pageContent.innerHTML = html;

                try {
                    const jsPath = filePath.replace('.html', '.js');
                    const jsModule = await import(jsPath);
                    if (jsModule.onLoad) {
                        jsModule.onLoad(pageContent);
                    }
                } catch (e) {
                    // 没有 JS 文件，忽略
                }

            } catch (error) {
                console.error('加载失败:', error);
                pageContent.innerHTML = `
                    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:1rem;">
                        <span style="font-size:4rem;">❌</span>
                        <h2 style="color:#e53e3e;">加载失败</h2>
                        <p style="color:#718096;">${error.message}</p>
                        <button onclick="location.reload()" style="padding:0.5rem 1.5rem;background:#4299e1;color:white;border:none;border-radius:8px;cursor:pointer;">
                            重试
                        </button>
                    </div>
                `;
            }
        }

        // ============================================================
        // 8. 渲染模块首页（子模块列表）
        // ============================================================
        function renderModuleIndex(menuItem) {
            const iconMap = {
                'dashboard': '📊', 'pos': '🛒', 'orders': '📋', 'products': '📦',
                'customers': '👥', 'marketing': '📣', 'inventory': '🏪', 'purchase': '📥',
                'finance': '💰', 'hr': '👔', 'saas': '☁️', 'system': '⚙️',
                'analytics': '📈', 'settings': '🔧', 'ai': '🤖'
            };
            const icon = iconMap[menuItem.id] || '📂';

            let childHtml = menuItem.children.map(child => `
                <div class="submodule-card" onclick="window.loadModule('${child.path}', '${menuItem.modulePath}', '${child.file}')">
                    <div class="submodule-icon">📄</div>
                    <div class="submodule-info">
                        <div class="submodule-name">${child.label}</div>
                        <div class="submodule-path">${child.file}</div>
                    </div>
                    <div class="submodule-arrow">→</div>
                </div>
            `).join('');

            pageContent.innerHTML = `
                <div class="module-header">
                    <span class="module-icon">${icon}</span>
                    <div>
                        <h1>${menuItem.label}</h1>
                        <p>${menuItem.children.length} 个子模块 · 点击进入</p>
                    </div>
                </div>
                <div class="submodule-grid">${childHtml}</div>
            `;

            // 暴露 loadModule 到全局
            window.loadModule = loadModule;
        }

        // ============================================================
        // 9. 退出登录
        // ============================================================
        async function logout() {
            try {
                await supabase.auth.signOut();
                localStorage.removeItem('sb-user');
                sessionStorage.removeItem('sb-user');
                window.location.href = '/login.html';
            } catch (err) {
                console.error('退出失败:', err);
                window.location.href = '/login.html';
            }
        }

        // ============================================================
        // 10. 初始化
        // ============================================================
        async function init() {
            const user = await checkAuth();
            if (!user) return;

            const displayName = user.email || user.user_metadata?.full_name || '管理员';
            document.getElementById('userDisplay').textContent = displayName;
            document.getElementById('userAvatar').textContent = displayName.charAt(0).toUpperCase();

            const initialPath = window.location.hash.slice(1) || '/dashboard';
            window.location.hash = initialPath;

            renderSidebar(initialPath);

            const defaultModule = MENU_CONFIG.find(m => m.path === '/dashboard');
            if (defaultModule) {
                loadModule('/dashboard', defaultModule.modulePath);
            }

            document.getElementById('toggleSidebar').addEventListener('click', () => {
                document.getElementById('app').classList.toggle('sidebar-collapsed');
            });

            document.getElementById('logoutBtn').addEventListener('click', logout);

            window.addEventListener('hashchange', () => {
                const path = window.location.hash.slice(1) || '/dashboard';
                const menuItem = findMenuItemByPath(path);
                if (menuItem) {
                    highlightMenu(path);
                    if (menuItem.file) {
                        loadModule(path, menuItem.modulePath, menuItem.file);
                    } else {
                        loadModule(path, menuItem.modulePath);
                    }
                }
            });

            window.loadModule = loadModule;

            console.log('%c🚗 BAI ERP 仪表盘已加载', 'font-size:16px;font-weight:bold;color:#4299e1;');
            console.log(`%c📂 共 ${MENU_CONFIG.length} 个主模块`, 'color:#718096;');
            console.log('%c👤 当前用户:', displayName);
        }

        // ============================================================
        // 11. 启动
        // ============================================================
        init();
    </script>
</body>
</html>

        /* ============================================================
           全局样式
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f7fafc;
            height: 100vh;
            overflow: hidden;
        }

        /* ============================================================
           应用容器
           ============================================================ */
        .app-container {
            display: flex;
            height: 100vh;
        }

        /* ============================================================
           侧边栏
           ============================================================ */
        .sidebar {
            width: 280px;
            background: #1a202c;
            color: #a0aec0;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: sticky;
            top: 0;
            transition: width 0.3s ease;
            overflow: hidden;
        }

        .sidebar-brand {
            padding: 1.25rem 1.5rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: white;
            border-bottom: 1px solid #2d3748;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
            min-height: 64px;
        }

        .sidebar-brand span {
            background: linear-gradient(135deg, #4299e1, #2b6cb0);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        .sidebar-brand .brand-badge {
            font-size: 0.6rem;
            background: #2b6cb0;
            color: white;
            padding: 0.1rem 0.5rem;
            border-radius: 10px;
            margin-left: auto;
        }

        /* ============================================================
           侧边栏导航
           ============================================================ */
        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0;
        }

        .sidebar-nav::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar-nav::-webkit-scrollbar-thumb {
            background: #4a5568;
            border-radius: 2px;
        }
        .sidebar-nav::-webkit-scrollbar-track {
            background: transparent;
        }

        /* ============================================================
           菜单样式
           ============================================================ */
        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        /* 主菜单项 */
        .menu-item {
            margin: 0;
        }

        .menu-link {
            display: flex;
            align-items: center;
            padding: 0.6rem 1.2rem;
            color: #a0aec0;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            gap: 0.75rem;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-size: 0.9rem;
            position: relative;
        }

        .menu-link:hover {
            background: #2d3748;
            color: white;
        }

        .menu-link.active {
            background: #2b6cb0;
            color: white;
        }

        .menu-link .menu-icon {
            font-size: 1.1rem;
            width: 24px;
            flex-shrink: 0;
            text-align: center;
        }

        .menu-link .menu-label {
            flex: 1;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .menu-link .menu-arrow {
            font-size: 0.65rem;
            transition: transform 0.3s ease;
            flex-shrink: 0;
            margin-left: auto;
        }

        .menu-link .menu-arrow.open {
            transform: rotate(180deg);
        }

        .menu-link .menu-badge {
            font-size: 0.6rem;
            background: #e53e3e;
            color: white;
            padding: 0.05rem 0.5rem;
            border-radius: 10px;
            flex-shrink: 0;
        }

        /* ============================================================
           子菜单（折叠式）
           ============================================================ */
        .sub-menu {
            list-style: none;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
            background: #0d1117;
        }

        .sub-menu.open {
            max-height: 2000px;
        }

        .sub-menu-link {
            display: block;
            padding: 0.4rem 1.2rem 0.4rem 3.2rem;
            color: #a0aec0;
            text-decoration: none;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            position: relative;
        }

        .sub-menu-link::before {
            content: '›';
            position: absolute;
            left: 2.4rem;
            opacity: 0.5;
            font-size: 1.2rem;
        }

        .sub-menu-link:hover {
            color: white;
            background: #1a202c;
        }

        .sub-menu-link.active {
            color: #63b3ed;
            background: #1a202c;
        }

        /* ============================================================
           侧边栏折叠状态
           ============================================================ */
        .sidebar-collapsed .sidebar {
            width: 64px;
        }

        .sidebar-collapsed .sidebar-brand span,
        .sidebar-collapsed .sidebar-brand .brand-badge,
        .sidebar-collapsed .menu-label,
        .sidebar-collapsed .menu-arrow,
        .sidebar-collapsed .menu-badge,
        .sidebar-collapsed .sub-menu {
            display: none;
        }

        .sidebar-collapsed .menu-link {
            justify-content: center;
            padding: 0.7rem 0;
        }

        .sidebar-collapsed .menu-link .menu-icon {
            font-size: 1.3rem;
            width: auto;
        }

        .sidebar-collapsed .sidebar-nav {
            overflow-x: hidden;
        }

        /* ============================================================
           主内容区域
           ============================================================ */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            height: 100vh;
            overflow: hidden;
        }

        /* ============================================================
           顶栏
           ============================================================ */
        .topbar {
            background: white;
            padding: 0.6rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
            min-height: 56px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .topbar-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #4a5568;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .topbar-btn:hover {
            background: #f7fafc;
        }

        .topbar-title {
            font-size: 1.1rem;
            color: #2d3748;
            font-weight: 600;
        }

        .topbar-title .title-path {
            font-size: 0.75rem;
            color: #a0aec0;
            font-weight: 400;
            margin-left: 0.5rem;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-name {
            font-size: 0.9rem;
            color: #4a5568;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #4299e1;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .logout-btn {
            color: #e53e3e;
            font-size: 0.85rem;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: #fff5f5;
        }

        /* ============================================================
           页面内容
           ============================================================ */
        .page-content {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            background: #f7fafc;
        }

        .page-content::-webkit-scrollbar {
            width: 6px;
        }
        .page-content::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 3px;
        }

        /* ============================================================
           加载状态
           ============================================================ */
        .loading-spinner {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 60vh;
            color: #a0aec0;
            font-size: 1.1rem;
            gap: 1rem;
        }

        .loading-spinner .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top-color: #4299e1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ============================================================
           响应式
           ============================================================ */
        @media (max-width: 768px) {
            .sidebar {
                width: 64px;
            }

            .sidebar-brand span,
            .sidebar-brand .brand-badge,
            .menu-label,
            .menu-arrow,
            .menu-badge,
            .sub-menu {
                display: none;
            }

            .menu-link {
                justify-content: center;
                padding: 0.7rem 0;
            }

            .menu-link .menu-icon {
                font-size: 1.3rem;
                width: auto;
            }

            .topbar-title .title-path {
                display: none;
            }

            .user-name {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .topbar {
                padding: 0.4rem 0.8rem;
            }
            .page-content {
                padding: 0.8rem;
            }
            .topbar-title {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

                children: [
                    { label: '系统设置', path: '/system', file: 'settings.html' },
                    { label: 'API Keys', path: '/system/api-keys', file: 'api-keys.html' },
                    { label: '审计日志', path: '/system/audit-logs', file: 'audit-logs.html' },
                    { label: '数据备份', path: '/system/backup', file: 'backup.html' },
                    { label: '集成管理', path: '/system/integrations', file: 'integrations.html' },
                    { label: '应用市场', path: '/system/marketplace', file: 'marketplace.html' },
                    { label: '通知管理', path: '/system/notifications', file: 'notifications.html' },
                    { label: '权限管理', path: '/system/permissions', file: 'permissions.html' },
                    { label: '数据恢复', path: '/system/restore', file: 'restore.html' },
                    { label: '角色管理', path: '/system/roles', file: 'roles.html' },
                    { label: '系统日志', path: '/system/system-logs', file: 'system-logs.html' },
                    { label: 'Webhooks', path: '/system/webhooks', file: 'webhooks.html' }
                ]
            },
            {
                id: 'analytics',
                label: '数据分析',
                icon: '📈',
                path: '/analytics',
                modulePath: '13-analytics/reports',
                children: [
                    { label: '报表中心', path: '/analytics', file: 'reports.html' },
                    { label: '业务健康', path: '/analytics/business-health', file: 'business-health.html' },
                    { label: '自定义报表', path: '/analytics/custom-reports', file: 'custom-reports.html' },
                    { label: '预测分析', path: '/analytics/forecast', file: 'forecast.html' },
                    { label: '智能推荐', path: '/analytics/recommendations', file: 'recommendations.html' },
                    { label: '可视化', path: '/analytics/visualizations', file: 'visualizations.html' }
                ]
            },
            {
                id: 'settings',
                label: '个人设置',
                icon: '🔧',
                path: '/settings',
                modulePath: '14-settings/profile',
                children: [
                    { label: '个人资料', path: '/settings', file: 'profile.html' },
                    { label: '分店管理', path: '/settings/branches', file: 'branches.html' },
                    { label: '公司信息', path: '/settings/company', file: 'company.html' },
                    { label: '通用设置', path: '/settings/general', file: 'general.html' },
                    { label: '偏好设置', path: '/settings/preferences', file: 'preferences.html' }
                ]
            },
            {
                id: 'ai',
                label: 'AI 智能中心',
                icon: '🤖',
                path: '/ai',
                modulePath: '15-ai/ai',
                children: [
                    { label: 'AI 助手', path: '/ai', file: 'ai.html' },
                    { label: 'CRM 智能', path: '/ai/crm', file: 'crm.html' }
                ]
            }
        ];

        // ============================================================
        // 4. DOM 引用
        // ============================================================
        const sidebarNav = document.getElementById('sidebarNav');
        const pageContent = document.getElementById('pageContent');
        const pageTitle = document.getElementById('pageTitle');
        const pagePath = document.getElementById('pagePath');

        // ============================================================
        // 5. 认证检查
        // ============================================================
        async function checkAuth() {
            try {
                const { data, error } = await supabase.auth.getSession();
                if (error || !data?.session) {
                    const localUser = localStorage.getItem('sb-user');
                    if (!localUser) {
                        window.location.href = '/login.html';
                        return null;
                    }
                    try {
                        const parsed = JSON.parse(localUser);
                        if (!parsed?.access_token) {
                            window.location.href = '/login.html';
                            return null;
                        }
                        return parsed;
                    } catch (e) {
                        window.location.href = '/login.html';
                        return null;
                    }
                }
                return data.session.user;
            } catch (err) {
                console.error('认证失败:', err);
                window.location.href = '/login.html';
                return null;
            }
        }

        // ============================================================
        // 6. 渲染侧边栏（折叠式多级菜单）
        // ============================================================
        function renderSidebar(activePath) {
            let html = '<ul class="menu-list">';

            MENU_CONFIG.forEach((item, index) => {
                const hasChildren = item.children && item.children.length > 0;
                const isActive = activePath && activePath.startsWith(item.path);
                const isOpen = isActive;

                html += `<li class="menu-item">`;
                html += `<button class="menu-link" data-path="${item.path}" data-module="${item.modulePath}" data-index="${index}">`;
                html += `<span class="menu-icon">${item.icon}</span>`;
                html += `<span class="menu-label">${item.label}</span>`;
                if (hasChildren) {
                    html += `<span class="menu-arrow ${isOpen ? 'open' : ''}">▾</span>`;
                }
                html += `</button>`;

                if (hasChildren) {
                    html += `<ul class="sub-menu ${isOpen ? 'open' : ''}">`;
                    item.children.forEach((child, childIndex) => {
                        const isChildActive = activePath === child.path;
                        html += `<li>`;
                        html += `<button class="sub-menu-link ${isChildActive ? 'active' : ''}" data-path="${child.path}" data-file="${child.file}" data-module="${item.modulePath}">`;
                        html += child.label;
                        html += `</button>`;
                        html += `</li>`;
                    });
                    html += `</ul>`;
                }

                html += `</li>`;
            });

            html += '</ul>';
            sidebarNav.innerHTML = html;

            // 主菜单点击事件（展开/折叠 + 导航）
            sidebarNav.querySelectorAll('.menu-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const path = this.dataset.path;
                    const modulePath = this.dataset.module;
                    const parentItem = this.closest('.menu-item');
                    const subMenu = parentItem.querySelector('.sub-menu');
                    const arrow = this.querySelector('.menu-arrow');

                    // 如果有子菜单，切换展开/折叠
                    if (subMenu) {
                        const isOpen = subMenu.classList.contains('open');
                        if (isOpen) {
                            subMenu.classList.remove('open');
                            if (arrow) arrow.classList.remove('open');
                        } else {
                            subMenu.classList.add('open');
                            if (arrow) arrow.classList.add('open');
                        }
                        // 高亮主菜单
                        sidebarNav.querySelectorAll('.menu-link').forEach(el => el.classList.remove('active'));
                        this.classList.add('active');
                        // 加载模块（使用主模块路径）
                        loadModule(path, modulePath);
                    } else {
                        // 没有子菜单，直接加载
                        sidebarNav.querySelectorAll('.menu-link').forEach(el => el.classList.remove('active'));
                        this.classList.add('active');
                        loadModule(path, modulePath);
                    }
                });
            });

            // 子菜单点击事件
            sidebarNav.querySelectorAll('.sub-menu-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const path = this.dataset.path;
                    const file = this.dataset.file;
                    const modulePath = this.dataset.module;

                    // 高亮
                    sidebarNav.querySelectorAll('.sub-menu-link').forEach(el => el.classList.remove('active'));
                    this.classList.add('active');

                    // 展开父菜单
                    const parentItem = this.closest('.menu-item');
                    const subMenu = parentItem.querySelector('.sub-menu');
                    const arrow = parentItem.querySelector('.menu-arrow');
                    if (subMenu) subMenu.classList.add('open');
                    if (arrow) arrow.classList.add('open');

                    // 加载模块
                    loadModule(path, modulePath, file);
                });
            });

            // 更新高亮
            if (activePath) {
                highlightMenu(activePath);
            }
        }

        // ============================================================
        // 7. 高亮菜单
        // ============================================================
        function highlightMenu(path) {
            // 清除所有高亮
            sidebarNav.querySelectorAll('.menu-link, .sub-menu-link').forEach(el => el.classList.remove('active'));

            // 查找匹配的子菜单
            let found = false;
            sidebarNav.querySelectorAll('.sub-menu-link').forEach(link => {
                if (link.dataset.path === path) {
                    link.classList.add('active');
                    // 展开父菜单
                    const parentItem = link.closest('.menu-item');
                    const subMenu = parentItem.querySelector('.sub-menu');
                    const arrow = parentItem.querySelector('.menu-arrow');
                    if (subMenu) subMenu.classList.add('open');
                    if (arrow) arrow.classList.add('open');
                    // 高亮主菜单
                    const mainLink = parentItem.querySelector('.menu-link');
                    if (mainLink) mainLink.classList.add('active');
                    found = true;
                }
            });

            // 如果没有子菜单匹配，尝试匹配主菜单
            if (!found) {
                sidebarNav.querySelectorAll('.menu-link').forEach(link => {
                    if (link.dataset.path === path) {
                        link.classList.add('active');
                    }
                });
            }
        }

        // ============================================================
        // 8. 加载模块
        // ============================================================
        async function loadModule(path, modulePath, file) {
            // 更新标题
            const label = getLabelByPath(path);
            pageTitle.textContent = label || path;
            pagePath.textContent = path;

            // 显示加载状态
            pageContent.innerHTML = `
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    加载 ${label || '模块'}...
                </div>
            `;

            try {
                // 构建文件路径
                let filePath;
                if (file) {
                    // 子模块有指定文件
                    filePath = `/modules/${modulePath}/${file}`;
                } else {
                    // 主模块使用 index.html
                    filePath = `/modules/${modulePath}/index.html`;
                }

                const response = await fetch(filePath);
                if (!response.ok) {
                    pageContent.innerHTML = `
                        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:1rem;">
                            <span style="font-size:4rem;">📄</span>
                            <h2 style="color:#e53e3e;">模块不存在</h2>
                            <p style="color:#718096;">${filePath}</p>
                            <button onclick="location.reload()" style="padding:0.5rem 1.5rem;background:#4299e1;color:white;border:none;border-radius:8px;cursor:pointer;">
                                刷新
                            </button>
                        </div>
                    `;
                    return;
                }

                const html = await response.text();
                pageContent.innerHTML = html;

                // 尝试加载对应的 JS
                try {
                    const jsPath = filePath.replace('.html', '.js');
                    const jsModule = await import(jsPath);
                    if (jsModule.onLoad) {
                        jsModule.onLoad(pageContent);
                    }
                } catch (e) {
                    // 没有 JS 文件，忽略
                }

            } catch (error) {
                console.error('加载失败:', error);
                pageContent.innerHTML = `
                    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:1rem;">
                        <span style="font-size:4rem;">❌</span>
                        <h2 style="color:#e53e3e;">加载失败</h2>
                        <p style="color:#718096;">${error.message}</p>
                        <button onclick="location.reload()" style="padding:0.5rem 1.5rem;background:#4299e1;color:white;border:none;border-radius:8px;cursor:pointer;">
                            重试
                        </button>
                    </div>
                `;
            }
        }

        // ============================================================
        // 9. 获取路径对应的标签
        // ============================================================
        function getLabelByPath(path) {
            for (const item of MENU_CONFIG) {
                if (item.path === path) return item.label;
                for (const child of (item.children || [])) {
                    if (child.path === path) return child.label;
                }
            }
            return path.replace(/^\/+/, '').replace(/-/g, ' ');
        }

        // ============================================================
        // 10. 退出登录
        // ============================================================
        async function logout() {
            try {
                await supabase.auth.signOut();
                localStorage.removeItem('sb-user');
                sessionStorage.removeItem('sb-user');
                window.location.href = '/login.html';
            } catch (err) {
                console.error('退出失败:', err);
                window.location.href = '/login.html';
            }
        }

        // ============================================================
        // 11. 初始化
        // ============================================================
        async function init() {
            const user = await checkAuth();
            if (!user) return;

            // 显示用户信息
            const displayName = user.email || user.user_metadata?.full_name || '管理员';
            document.getElementById('userDisplay').textContent = displayName;
            document.getElementById('userAvatar').textContent = displayName.charAt(0).toUpperCase();

            // 从 URL hash 获取当前路径
            const initialPath = window.location.hash.slice(1) || '/dashboard';
            window.location.hash = initialPath;

            // 渲染侧边栏
            renderSidebar(initialPath);

            // 加载默认模块
            const defaultModule = MENU_CONFIG.find(m => m.path === '/dashboard');
            if (defaultModule) {
                loadModule('/dashboard', defaultModule.modulePath);
            }

            // 侧边栏折叠切换
            document.getElementById('toggleSidebar').addEventListener('click', () => {
                document.getElementById('app').classList.toggle('sidebar-collapsed');
            });

            // 退出登录
            document.getElementById('logoutBtn').addEventListener('click', logout);

            // 监听 hash 变化
            window.addEventListener('hashchange', () => {
                const path = window.location.hash.slice(1) || '/dashboard';
                const menuItem = findMenuItemByPath(path);
                if (menuItem) {
                    highlightMenu(path);
                    if (menuItem.file) {
                        loadModule(path, menuItem.modulePath, menuItem.file);
                    } else {
                        loadModule(path, menuItem.modulePath);
                    }
                }
            });

            // 暴露到全局
            window.loadModule = loadModule;

            console.log('%c🚗 BAI ERP 仪表盘已加载', 'font-size:16px;font-weight:bold;color:#4299e1;');
            console.log(`%c📂 共 ${MENU_CONFIG.length} 个主模块，${MENU_CONFIG.reduce((acc, m) => acc + (m.children?.length || 0), 0)} 个子模块`, 'color:#718096;');
            console.log('%c👤 当前用户:', displayName);
        }

        // ============================================================
        // 12. 根据路径查找菜单项
        // ============================================================
        function findMenuItemByPath(path) {
            for (const item of MENU_CONFIG) {
                if (item.path === path) {
                    return { ...item, file: null };
                }
                for (const child of (item.children || [])) {
                    if (child.path === path) {
                        return { ...child, modulePath: item.modulePath };
                    }
                }
            }
            return null;
        }

        // ============================================================
        // 13. 启动
        // ============================================================
        init();
    </script>

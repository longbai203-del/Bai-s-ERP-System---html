<html>
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <div class="main-wrapper">

                <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAI ERP - 登录</title>
    <style>
        /* CSS 同上（省略，用之前的） */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            padding: 1rem;
        }
        .login-container {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 420px;
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-logo { text-align: center; margin-bottom: 2rem; }
        .login-logo .logo-icon { font-size: 3rem; display: block; margin-bottom: 0.5rem; }
        .login-logo h1 { color: #1a202c; font-size: 2rem; font-weight: 700; }
        .login-logo h1 span {
            background: linear-gradient(135deg, #4299e1, #2b6cb0);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }
        .login-logo p { color: #718096; font-size: 0.9rem; margin-top: 0.25rem; }
        .login-subtitle { text-align: center; color: #a0aec0; font-size: 0.8rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #edf2f7; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #2d3748; font-size: 0.875rem; }
        .form-group label .required { color: #e53e3e; margin-left: 2px; }
        .form-group .input-wrapper { position: relative; }
        .form-group .input-wrapper .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            color: #a0aec0;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.8rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f7fafc;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 4px rgba(66,153,225,0.15);
            background: white;
        }
        .form-group input.error {
            border-color: #e53e3e;
            box-shadow: 0 0 0 4px rgba(229,62,62,0.1);
        }
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
        }
        .form-options label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #4a5568;
            cursor: pointer;
        }
        .form-options label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #4299e1;
            cursor: pointer;
        }
        .form-options a { color: #4299e1; text-decoration: none; cursor: pointer; }
        .form-options a:hover { color: #2b6cb0; text-decoration: underline; }
        .btn-primary {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #4299e1, #3182ce);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(66,153,225,0.3); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .btn-primary .btn-loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        .btn-primary.loading .btn-loader { display: block; }
        .btn-primary.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-message {
            color: #e53e3e;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
            background: #fff5f5;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border-left: 4px solid #e53e3e;
            align-items: center;
            gap: 0.5rem;
        }
        .error-message.visible { display: flex; }
        .success-message {
            color: #38a169;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
            background: #f0fff4;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border-left: 4px solid #38a169;
            align-items: center;
            gap: 0.5rem;
        }
        .success-message.visible { display: flex; }
        .login-footer { text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #edf2f7; color: #a0aec0; font-size: 0.8rem; }
        .login-footer .footer-links { display: flex; justify-content: center; gap: 1.5rem; margin-top: 0.5rem; }
        .login-footer .footer-links a { color: #a0aec0; text-decoration: none; cursor: pointer; }
        .login-footer .footer-links a:hover { color: #4299e1; }
        @media (max-width: 480px) {
            .login-container { padding: 1.5rem 1rem; }
            .login-logo h1 { font-size: 1.5rem; }
            .form-options { flex-direction: column; gap: 0.5rem; align-items: flex-start; }
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #a0aec0;
            font-size: 1.1rem;
            padding: 0.25rem;
        }
        .toggle-password:hover { color: #4a5568; }
        .version-badge {
            display: inline-block;
            background: #edf2f7;
            color: #4a5568;
            font-size: 0.7rem;
            padding: 0.15rem 0.6rem;
            border-radius: 20px;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-logo">
            <span class="logo-icon">🚗</span>
            <h1><span>BAI</span> ERP</h1>
            <p>智能洗车 · 企业管理平台</p>
            <span class="version-badge">v1.0.0</span>
        </div>
        <div class="login-subtitle">登录以继续使用系统</div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="email">邮箱地址 <span class="required">*</span></label>
                <div class="input-wrapper">
                    <span class="input-icon">📧</span>
                    <input type="email" id="email" placeholder="请输入您的邮箱" required autocomplete="email" autofocus>
                </div>
            </div>
            <div class="form-group">
                <label for="password">密码 <span class="required">*</span></label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" placeholder="请输入您的密码" required autocomplete="current-password">
                    <button type="button" class="toggle-password" id="togglePassword">👁️</button>
                </div>
            </div>
            <div class="form-options">
                <label><input type="checkbox" id="rememberMe"> 记住我</label>
                <a id="forgotPassword">忘记密码？</a>
            </div>
            <div id="errorMessage" class="error-message"><span>❌</span><span id="errorText">错误信息</span></div>
            <div id="successMessage" class="success-message"><span>✅</span><span id="successText">登录成功！正在跳转...</span></div>
            <button type="submit" class="btn-primary" id="loginBtn">
                <span class="btn-text">登 录</span>
                <span class="btn-loader"></span>
            </button>
        </form>

        <div class="login-footer">
            <p>© 2026 BAI ERP · 基于 Supabase</p>
            <div class="footer-links">
                <a>隐私政策</a>
                <a>服务条款</a>
                <a>帮助中心</a>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
            }
        }
    </script>

    <script type="module">
        // ============================================================
        // 1. 导入
        // ============================================================
        import { createClient } from '@supabase/supabase-js';

        // ============================================================
        // 2. Supabase 配置
        // ============================================================
        const SUPABASE_URL = 'https://sthrubrefavbomjlobew.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN0aHJ1YnJlZmF2Ym9tamxvYmV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMzM4MzksImV4cCI6MjA5OTcwOTgzOX0.LtBBe_QWq_5WXwVw7ELIQJuy9M7fzHd-R6VTMVkXqyg';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // 3. DOM
        // ============================================================
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successDiv = document.getElementById('successMessage');
        const successText = document.getElementById('successText');
        const loginBtn = document.getElementById('loginBtn');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const rememberMe = document.getElementById('rememberMe');

        function showError(msg) {
            errorText.textContent = msg;
            errorDiv.classList.add('visible');
            successDiv.classList.remove('visible');
        }

        function hideError() {
            errorDiv.classList.remove('visible');
        }

        function showSuccess(msg) {
            successText.textContent = msg;
            successDiv.classList.add('visible');
            errorDiv.classList.remove('visible');
        }

        function setLoading(loading) {
            if (loading) {
                loginBtn.classList.add('loading');
                loginBtn.disabled = true;
            } else {
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // ============================================================
        // 4. 检查登录状态（✅ 修复：没有 return 在函数外）
        // ============================================================
        async function checkSession() {
            try {
                const { data, error } = await supabase.auth.getSession();
                if (error) {
                    console.warn('获取会话失败:', error.message);
                    return false;
                }
                if (data?.session) {
                    // 有 session，跳转到 dashboard
                    window.location.href = '/dashboard.html';
                    return true;
                }
                return false;
            } catch (err) {
                console.warn('检查会话出错:', err);
                return false;
            }
        }

        // ============================================================
        // 5. 登录
        // ============================================================
        async function handleLogin(email, password) {
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email.trim(),
                    password: password
                });

                if (error) {
                    if (error.message.includes('Invalid login credentials')) {
                        showError('邮箱或密码错误，请重新输入');
                    } else if (error.message.includes('Email not confirmed')) {
                        showError('邮箱尚未验证，请查收验证邮件');
                    } else if (error.message.includes('Too many requests')) {
                        showError('请求过于频繁，请稍后再试');
                    } else {
                        showError(error.message || '登录失败，请稍后重试');
                    }
                    return false;
                }

                if (data?.user) {
                    const userData = {
                        id: data.user.id,
                        email: data.user.email,
                        access_token: data.session?.access_token
                    };
                    if (rememberMe.checked) {
                        localStorage.setItem('sb-user', JSON.stringify(userData));
                    } else {
                        sessionStorage.setItem('sb-user', JSON.stringify(userData));
                    }
                    showSuccess('登录成功！正在跳转...');
                    setLoading(true);
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 800);
                    return true;
                }
                showError('登录失败，请稍后重试');
                return false;
            } catch (err) {
                console.error('登录异常:', err);
                showError('网络异常，请检查网络连接后重试');
                return false;
            }
        }

        // ============================================================
        // 6. 表单提交
        // ============================================================
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const email = emailInput.value.trim();
            if (!email) {
                showError('请输入邮箱地址');
                emailInput.focus();
                emailInput.classList.add('error');
                return;
            }
            if (!isValidEmail(email)) {
                showError('请输入有效的邮箱地址');
                emailInput.focus();
                emailInput.classList.add('error');
                return;
            }
            emailInput.classList.remove('error');

            const password = passwordInput.value;
            if (!password) {
                showError('请输入密码');
                passwordInput.focus();
                passwordInput.classList.add('error');
                return;
            }
            if (password.length < 6) {
                showError('密码长度不能少于6位');
                passwordInput.focus();
                passwordInput.classList.add('error');
                return;
            }
            passwordInput.classList.remove('error');

            setLoading(true);
            await handleLogin(email, password);
            setLoading(false);
        });

        // ============================================================
        // 7. 密码切换
        // ============================================================
        togglePasswordBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePasswordBtn.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
        });

        // ============================================================
        // 8. 忘记密码
        // ============================================================
        document.getElementById('forgotPassword').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            if (!email || !isValidEmail(email)) {
                showError('请先输入有效的邮箱地址');
                emailInput.focus();
                return;
            }
            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/reset-password.html'
                });
                if (error) {
                    showError(error.message || '发送重置邮件失败');
                    return;
                }
                showSuccess('密码重置链接已发送到您的邮箱');
            } catch (err) {
                showError('发送重置邮件失败，请稍后重试');
            }
        });

        // ============================================================
        // 9. 输入框清除错误状态
        // ============================================================
        emailInput.addEventListener('input', () => {
            emailInput.classList.remove('error');
            hideError();
        });
        passwordInput.addEventListener('input', () => {
            passwordInput.classList.remove('error');
            hideError();
        });

        // ============================================================
        // 10. 初始化（✅ 修复：先检查 session，再恢复记住的邮箱）
        // ============================================================
        async function init() {
            // 先检查是否有有效 session
            await checkSession();

            // 恢复记住的邮箱
            const savedEmail = localStorage.getItem('saved-email');
            if (savedEmail) {
                emailInput.value = savedEmail;
                rememberMe.checked = true;
            }
        }

        init();

        console.log('%c🚗 BAI ERP 登录页面已加载', 'font-size:16px;font-weight:bold;color:#4299e1;');
        console.log('%c✅ Supabase 已连接', 'color:#38a169;');
    </script>
</body>
</html>
            </main>
        </div>
    </div>
    <script type="module" src="/core/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户展示 - Carwash Pro</title>
    <link rel="stylesheet" href="../../css/design-system.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============================================================
           客户展示屏样式（全屏模式）
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0F172A;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        .display-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px 40px;
            background: linear-gradient(180deg, #0F172A 0%, #1E293B 100%);
        }

        /* 顶部 */
        .display-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }

        .display-header .brand {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #818CF8, #4F46E5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .display-header .brand i {
            -webkit-text-fill-color: #818CF8;
        }

        .display-header .time {
            font-size: 20px;
            font-weight: 300;
            color: #94A3B8;
        }

        /* 主内容 */
        .display-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
            padding: 20px 0;
        }

        .display-main .status-icon {
            font-size: 80px;
            color: #10B981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .display-main .status-text {
            font-size: 48px;
            font-weight: 700;
            color: white;
        }

        .display-main .status-text .highlight {
            color: #818CF8;
        }

        .display-main .status-sub {
            font-size: 20px;
            color: #94A3B8;
        }

        /* 信息网格 */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
        }

        .info-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .info-item .value {
            font-size: 32px;
            font-weight: 700;
            color: #818CF8;
        }

        .info-item .label {
            font-size: 14px;
            color: #94A3B8;
            margin-top: 4px;
        }

        .info-item .value.green { color: #10B981; }
        .info-item .value.orange { color: #F59E0B; }
        .info-item .value.pink { color: #EC4899; }

        /* 底部 */
        .display-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
            color: #64748B;
            flex-shrink: 0;
        }

        .display-footer .welcome-text {
            color: #94A3B8;
        }

        .display-footer .welcome-text i {
            color: #F59E0B;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .display-container {
                padding: 16px 20px;
            }
            .display-main .status-text {
                font-size: 28px;
            }
            .display-main .status-icon {
                font-size: 50px;
            }
            .info-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .info-item .value {
                font-size: 24px;
            }
            .display-header .brand {
                font-size: 18px;
            }
            .display-header .time {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .info-grid {
                grid-template-columns: 1fr 1fr;
            }
            .display-main .status-text {
                font-size: 22px;
                text-align: center;
            }
            .display-main .status-sub {
                font-size: 16px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="display-container">
        <!-- 顶部 -->
        <div class="display-header">
            <div class="brand">
                <i class="fas fa-car"></i>
                Carwash Pro
            </div>
            <div class="time" id="displayTime">14:30:00</div>
        </div>

        <!-- 主内容 -->
        <div class="display-main">
            <div class="status-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <div class="status-text">
                欢迎光临 <span class="highlight">Carwash Pro</span>
            </div>
            <div class="status-sub">请扫码或前往收银台办理业务</div>

            <!-- 信息网格 -->
            <div class="info-grid">
                <div class="info-item">
                    <div class="value green">42</div>
                    <div class="label">🚗 今日洗车</div>
                </div>
                <div class="info-item">
                    <div class="value">¥12,580</div>
                    <div class="label">💰 今日收入</div>
                </div>
                <div class="info-item">
                    <div class="value orange">8</div>
                    <div class="label">⏳ 等待中</div>
                </div>
                <div class="info-item">
                    <div class="value pink">4.8⭐</div>
                    <div class="label">📊 客户评分</div>
                </div>
            </div>
        </div>

        <!-- 底部 -->
        <div class="display-footer">
            <span class="welcome-text">
                <i class="fas fa-heart" style="color:#EC4899;"></i>
                感谢您的光临，祝您生活愉快！
            </span>
            <span>v2.0 · 智能洗车管理系统</span>
        </div>
    </div>

    <script>
        // 时钟更新
        function updateClock() {
            const now = new Date();
            document.getElementById('displayTime').textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
        }
        updateClock();
        setInterval(updateClock, 1000);

        // 模拟数据更新
        setInterval(() => {
            const values = document.querySelectorAll('.info-item .value');
            if (values.length >= 4) {
                // 模拟数据变化
                const current = parseInt(values[0].textContent);
                values[0].textContent = current + (Math.random() > 0.7 ? 1 : 0);
            }
        }, 5000);

        console.log('📺 客户展示屏已启动');
    </script>
</body>
</html>

                <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兑换管理 - Carwash Pro</title>
    
    
    <style>
        .exchange-container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }

        .page-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1F2937;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card {
            background: white;
            border-radius: 12px;
            border: 1px solid #E5E7EB;
            padding: 20px;
            margin-bottom: 16px;
        }

        .card h3 {
            font-size: 16px;
            font-weight: 600;
            color: #1F2937;
            margin: 0 0 12px 0;
        }

        .form-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: #4B5563;
            min-width: 80px;
        }

        .form-group input,
        .form-group select {
            padding: 8px 14px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-size: 14px;
            flex: 1;
            min-width: 150px;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #4F46E5;
            outline: none;
        }

        .table-container {
            background: white;
            border-radius: 12px;
            border: 1px solid #E5E7EB;
            overflow: hidden;
        }

        .table-container table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .table-container thead {
            background: #F9FAFB;
        }

        .table-container th {
            padding: 10px 14px;
            text-align: left;
            font-weight: 600;
            color: #6B7280;
            font-size: 12px;
            border-bottom: 1px solid #E5E7EB;
        }

        .table-container td {
            padding: 10px 14px;
            border-bottom: 1px solid #F3F4F6;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-success { background: #D1FAE5; color: #065F46; }
        .badge-warning { background: #FEF3C7; color: #92400E; }
        .badge-secondary { background: #F3F4F6; color: #6B7280; }

        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 6px;
        }

        @media (max-width: 640px) {
            .form-group {
                flex-direction: column;
                align-items: stretch;
            }
            .form-group label {
                min-width: auto;
            }
            .exchange-container {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="exchange-container">
        <div class="page-header">
            <h1>
                <i class="fas fa-exchange-alt" style="color:#F59E0B;"></i>
                兑换管理
            </h1>
            <div>
                <button class="btn btn-success" onclick="alert('✅ 新建兑换单')">
                    <i class="fas fa-plus"></i> 新建兑换
                </button>
                <button class="btn btn-outline" onclick="alert('📥 导出数据')">
                    <i class="fas fa-file-export"></i> 导出
                </button>
            </div>
        </div>

        <!-- 查询表单 -->
        <div class="card">
            <h3><i class="fas fa-search" style="color:#4F46E5;"></i> 查询兑换</h3>
            <div class="form-group">
                <label>会员卡号</label>
                <input type="text" placeholder="请输入会员卡号...">
                <label style="min-width:60px;">状态</label>
                <select>
                    <option value="">全部</option>
                    <option value="pending">待处理</option>
                    <option value="completed">已完成</option>
                    <option value="cancelled">已取消</option>
                </select>
                <button class="btn btn-primary"><i class="fas fa-search"></i> 查询</button>
                <button class="btn btn-outline"><i class="fas fa-undo"></i> 重置</button>
            </div>
        </div>

        <!-- 兑换列表 -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>兑换单号</th>
                        <th>会员</th>
                        <th>兑换商品</th>
                        <th>所需积分</th>
                        <th>状态</th>
                        <th>时间</th>
                        <th style="text-align:center;">操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>EXC-2024-001</strong></td>
                        <td>王小明</td>
                        <td>洗车券 × 2</td>
                        <td>500</td>
                        <td><span class="badge badge-success">已完成</span></td>
                        <td>2024-07-11 14:30</td>
                        <td style="text-align:center;">
                            <button class="btn btn-sm btn-outline"><i class="fas fa-eye"></i></button>
                        </td>
                    </tr>
                    <tr>
                        <td><strong>EXC-2024-002</strong></td>
                        <td>李小红</td>
                        <td>内饰清洁券</td>
                        <td>300</td>
                        <td><span class="badge badge-warning">待处理</span></td>
                        <td>2024-07-11 13:15</td>
                        <td style="text-align:center;">
                            <button class="btn btn-sm btn-success"><i class="fas fa-check"></i></button>
                            <button class="btn btn-sm btn-outline"><i class="fas fa-eye"></i></button>
                        </td>
                    </tr>
                    <tr>
                        <td><strong>EXC-2024-003</strong></td>
                        <td>张伟</td>
                        <td>全车镀晶</td>
                        <td>1200</td>
                        <td><span class="badge badge-secondary">已取消</span></td>
                        <td>2024-07-10 16:20</td>
                        <td style="text-align:center;">
                            <button class="btn btn-sm btn-outline"><i class="fas fa-eye"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { init } from './exchange.js';

        document.addEventListener('DOMContentLoaded', function() {
            console.log('🔄 兑换管理页面加载');
            init().catch(err => console.warn('兑换模块初始化失败:', err));
        });
    </script>
</body>
</html>
            </main>
        </div>
    </div>
    
</body>
</html>

            </main>
        </div>
    </div>
    <script type="module" src="/core/app.js"></script>
</body>

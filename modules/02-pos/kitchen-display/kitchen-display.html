                <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工位展示 - Carwash Pro</title>
    
    
    <style>
        /* ============================================================
           工位展示屏样式（全屏模式）
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0F172A;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        .kitchen-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px 30px;
            background: linear-gradient(180deg, #0F172A 0%, #1E293B 100%);
        }

        .kitchen-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }

        .kitchen-header .title {
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .kitchen-header .title i {
            color: #818CF8;
        }

        .kitchen-header .stats {
            display: flex;
            gap: 24px;
            font-size: 14px;
            color: #94A3B8;
        }

        .kitchen-header .stats span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .kitchen-header .stats .num {
            font-weight: 700;
            color: white;
            font-size: 18px;
        }

        /* 订单网格 */
        .order-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            padding: 16px 0;
            overflow-y: auto;
            align-content: start;
        }

        .order-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
        }

        .order-card:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.15);
        }

        .order-card .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .order-card .order-header .order-id {
            font-size: 16px;
            font-weight: 600;
            color: #818CF8;
        }

        .order-card .order-header .order-time {
            font-size: 13px;
            color: #94A3B8;
        }

        .order-card .order-items {
            margin: 8px 0;
        }

        .order-card .order-items .item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .order-card .order-items .item:last-child {
            border-bottom: none;
        }

        .order-card .order-items .item .qty {
            color: #818CF8;
            font-weight: 600;
            margin-right: 8px;
        }

        .order-card .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .order-card .order-footer .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 500;
        }

        .order-card .order-footer .status.pending {
            background: rgba(245, 158, 11, 0.2);
            color: #F59E0B;
        }

        .order-card .order-footer .status.processing {
            background: rgba(79, 70, 229, 0.2);
            color: #818CF8;
        }

        .order-card .order-footer .status.completed {
            background: rgba(16, 185, 129, 0.2);
            color: #10B981;
        }

        .order-card .order-footer .timer {
            font-size: 13px;
            color: #94A3B8;
        }

        .order-card .order-footer .timer i {
            color: #F59E0B;
            margin-right: 4px;
        }

        .order-card .order-footer .action-btn {
            padding: 4px 14px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .order-card .order-footer .action-btn.primary {
            background: #4F46E5;
            color: white;
        }

        .order-card .order-footer .action-btn.primary:hover {
            background: #4338CA;
        }

        .order-card .order-footer .action-btn.success {
            background: #10B981;
            color: white;
        }

        .order-card .order-footer .action-btn.success:hover {
            background: #059669;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .kitchen-container {
                padding: 12px 16px;
            }
            .kitchen-header .title {
                font-size: 20px;
            }
            .kitchen-header .stats {
                font-size: 12px;
                gap: 12px;
            }
            .kitchen-header .stats .num {
                font-size: 14px;
            }
            .order-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 12px;
            }
        }

        @media (max-width: 480px) {
            .order-grid {
                grid-template-columns: 1fr;
            }
            .kitchen-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .kitchen-header .stats {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="kitchen-container">
        <!-- 头部 -->
        <div class="kitchen-header">
            <div class="title">
                <i class="fas fa-tools"></i>
                工位看板
            </div>
            <div class="stats">
                <span>⏳ 待处理: <span class="num" id="pendingCount">3</span></span>
                <span>🔧 进行中: <span class="num" id="processingCount">2</span></span>
                <span>✅ 已完成: <span class="num" id="completedCount">12</span></span>
                <span>📅 <span id="kitchenDate">2024-07-11</span></span>
            </div>
        </div>

        <!-- 订单网格 -->
        <div class="order-grid" id="orderGrid">
            <!-- 示例订单 -->
            <div class="order-card">
                <div class="order-header">
                    <span class="order-id">#ORD-2024-001</span>
                    <span class="order-time">14:30</span>
                </div>
                <div class="order-items">
                    <div class="item"><span><span class="qty">×2</span>标准洗车</span> <span>¥178</span></div>
                    <div class="item"><span><span class="qty">×1</span>内饰清洁</span> <span>¥299</span></div>
                </div>
                <div class="order-footer">
                    <span class="status pending">⏳ 待处理</span>
                    <span class="timer"><i class="fas fa-clock"></i> 等待 5分钟</span>
                    <button class="action-btn primary">开始</button>
                </div>
            </div>

            <div class="order-card">
                <div class="order-header">
                    <span class="order-id">#ORD-2024-002</span>
                    <span class="order-time">14:15</span>
                </div>
                <div class="order-items">
                    <div class="item"><span><span class="qty">×1</span>全车镀晶</span> <span>¥899</span></div>
                </div>
                <div class="order-footer">
                    <span class="status processing">🔧 进行中</span>
                    <span class="timer"><i class="fas fa-clock"></i> 已做 12分钟</span>
                    <button class="action-btn success">完成</button>
                </div>
            </div>

            <div class="order-card">
                <div class="order-header">
                    <span class="order-id">#ORD-2024-003</span>
                    <span class="order-time">13:50</span>
                </div>
                <div class="order-items">
                    <div class="item"><span><span class="qty">×1</span>精致洗车</span> <span>¥159</span></div>
                    <div class="item"><span><span class="qty">×2</span>轮胎护理</span> <span>¥120</span></div>
                </div>
                <div class="order-footer">
                    <span class="status pending">⏳ 待处理</span>
                    <span class="timer"><i class="fas fa-clock"></i> 等待 25分钟</span>
                    <button class="action-btn primary">开始</button>
                </div>
            </div>

            <div class="order-card">
                <div class="order-header">
                    <span class="order-id">#ORD-2024-004</span>
                    <span class="order-time">13:20</span>
                </div>
                <div class="order-items">
                    <div class="item"><span><span class="qty">×1</span>VIP洗车套餐</span> <span>¥599</span></div>
                </div>
                <div class="order-footer">
                    <span class="status completed">✅ 已完成</span>
                    <span class="timer"><i class="fas fa-check-circle"></i> 完成于 13:45</span>
                    <button class="action-btn success" style="opacity:0.6;" disabled>已完成</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 日期显示
        document.getElementById('kitchenDate').textContent = new Date().toLocaleDateString('zh-CN');

        // 模拟订单更新
        setInterval(() => {
            const orderCards = document.querySelectorAll('.order-card');
            const pending = document.querySelectorAll('.order-card .status.pending').length;
            const processing = document.querySelectorAll('.order-card .status.processing').length;
            const completed = document.querySelectorAll('.order-card .status.completed').length;

            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('processingCount').textContent = processing;
            document.getElementById('completedCount').textContent = completed;
        }, 1000);

        // 按钮点击事件
        document.querySelectorAll('.action-btn.primary').forEach(btn => {
            btn.addEventListener('click', function() {
                const card = this.closest('.order-card');
                const statusEl = card.querySelector('.status');
                statusEl.className = 'status processing';
                statusEl.textContent = '🔧 进行中';
                this.textContent = '进行中...';
                this.className = 'action-btn success';
                this.textContent = '完成';
                // 更新计数
                document.getElementById('pendingCount').textContent = 
                    document.querySelectorAll('.order-card .status.pending').length;
                document.getElementById('processingCount').textContent = 
                    document.querySelectorAll('.order-card .status.processing').length;
            });
        });

        document.querySelectorAll('.action-btn.success:not(:disabled)').forEach(btn => {
            btn.addEventListener('click', function() {
                if (this.textContent === '完成' || this.textContent === '进行中...') {
                    const card = this.closest('.order-card');
                    const statusEl = card.querySelector('.status');
                    statusEl.className = 'status completed';
                    statusEl.textContent = '✅ 已完成';
                    this.textContent = '✅ 已完成';
                    this.disabled = true;
                    this.style.opacity = '0.6';
                    // 更新计数
                    document.getElementById('processingCount').textContent = 
                        document.querySelectorAll('.order-card .status.processing').length;
                    document.getElementById('completedCount').textContent = 
                        document.querySelectorAll('.order-card .status.completed').length;
                }
            });
        });

        console.log('🔧 工位看板已启动');
    </script>
</body>
</html>

        </div>
    </div>
    
</body>

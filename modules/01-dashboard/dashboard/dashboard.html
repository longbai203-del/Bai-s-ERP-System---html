<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - Carwash Pro</title>
    <link rel="stylesheet" href="../../css/design-system.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============================================================
           仪表盘样式
           ============================================================ */
        .dashboard-container {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 页面头部 */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }

        .page-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1F2937;
            margin: 0;
        }

        .page-header .subtitle {
            font-size: 14px;
            color: #6B7280;
            margin-top: 4px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* 统计卡片网格 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #E5E7EB;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            border-color: #4F46E5;
        }

        .stat-card .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 12px;
        }

        .stat-card .stat-icon.blue { background: #EEF2FF; color: #4F46E5; }
        .stat-card .stat-icon.green { background: #D1FAE5; color: #10B981; }
        .stat-card .stat-icon.purple { background: #F0E7FF; color: #7C3AED; }
        .stat-card .stat-icon.orange { background: #FEF3C7; color: #F59E0B; }
        .stat-card .stat-icon.red { background: #FEE2E2; color: #EF4444; }

        .stat-card .stat-label {
            font-size: 13px;
            color: #6B7280;
            font-weight: 500;
        }

        .stat-card .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #1F2937;
            margin: 4px 0;
        }

        .stat-card .stat-change {
            font-size: 12px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .stat-card .stat-change.positive { color: #10B981; }
        .stat-card .stat-change.negative { color: #EF4444; }
        .stat-card .stat-change.neutral { color: #6B7280; }

        /* 两列布局 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 992px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 卡片通用样式 */
        .card {
            background: white;
            border-radius: 12px;
            border: 1px solid #E5E7EB;
            overflow: hidden;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid #F3F4F6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .card-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: #1F2937;
            margin: 0;
        }

        .card-body {
            padding: 20px;
        }

        /* 图表容器 */
        .chart-container {
            height: 280px;
            position: relative;
        }

        /* 订单列表 */
        .order-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #F3F4F6;
            transition: background 0.2s;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-item:hover {
            background: #F9FAFB;
            margin: 0 -20px;
            padding: 12px 20px;
        }

        .order-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .order-info .order-id {
            font-size: 13px;
            font-weight: 500;
            color: #1F2937;
        }

        .order-info .order-customer {
            font-size: 12px;
            color: #6B7280;
        }

        .order-amount {
            font-size: 15px;
            font-weight: 600;
            color: #1F2937;
        }

        .order-status {
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 500;
        }

        .order-status.completed { background: #D1FAE5; color: #065F46; }
        .order-status.pending { background: #FEF3C7; color: #92400E; }
        .order-status.processing { background: #DBEAFE; color: #1E40AF; }
        .order-status.cancelled { background: #FEE2E2; color: #991B1B; }

        /* 快速操作 */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .quick-action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #E5E7EB;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: #1F2937;
        }

        .quick-action-btn:hover {
            border-color: #4F46E5;
            background: #F5F3FF;
            transform: translateY(-2px);
        }

        .quick-action-btn i {
            font-size: 24px;
            color: #4F46E5;
            margin-bottom: 6px;
        }

        .quick-action-btn span {
            font-size: 12px;
            font-weight: 500;
        }

        /* 响应式调整 */
        @media (max-width: 640px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .stat-card .stat-value {
                font-size: 20px;
            }

            .page-header h1 {
                font-size: 20px;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .quick-actions {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 主内容 -->
    <div class="dashboard-container" id="dashboardContainer">
        <!-- 页面头部 -->
        <div class="page-header">
            <div>
                <h1><i class="fas fa-chart-pie" style="color:#4F46E5;margin-right:10px;"></i>仪表盘</h1>
                <div class="subtitle">实时业务数据概览，掌握门店运营状况</div>
            </div>
            <div class="header-actions">
                <span id="lastUpdate" style="font-size:12px;color:#6B7280;">更新于: 刚刚</span>
                <button class="btn btn-primary" id="refreshDashboard" title="刷新数据">
                    <i class="fas fa-sync"></i> 刷新
                </button>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon blue"><i class="fas fa-dollar-sign"></i></div>
                <div class="stat-label">今日收入</div>
                <div class="stat-value" id="todayRevenue">¥0</div>
                <div class="stat-change positive"><i class="fas fa-arrow-up"></i> 12.5%</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i class="fas fa-shopping-cart"></i></div>
                <div class="stat-label">今日订单</div>
                <div class="stat-value" id="todayOrders">0</div>
                <div class="stat-change positive"><i class="fas fa-arrow-up"></i> 8.3%</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple"><i class="fas fa-users"></i></div>
                <div class="stat-label">活跃客户</div>
                <div class="stat-value" id="activeCustomers">0</div>
                <div class="stat-change neutral"><i class="fas fa-minus"></i> 稳定</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange"><i class="fas fa-percent"></i></div>
                <div class="stat-label">转化率</div>
                <div class="stat-value" id="conversionRate">0%</div>
                <div class="stat-change positive"><i class="fas fa-arrow-up"></i> 3.1%</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon red"><i class="fas fa-exclamation-triangle"></i></div>
                <div class="stat-label">低库存预警</div>
                <div class="stat-value" id="lowStockCount">0</div>
                <div class="stat-change negative"><i class="fas fa-arrow-up"></i> 2件</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon blue"><i class="fas fa-car"></i></div>
                <div class="stat-label">当前在场车辆</div>
                <div class="stat-value" id="currentVehicles">0</div>
                <div class="stat-change positive"><i class="fas fa-arrow-up"></i> 活跃</div>
            </div>
        </div>

        <!-- 主内容网格 -->
        <div class="dashboard-grid">
            <!-- 销售趋势图表 -->
            <div class="card">
                <div class="card-header">
                    <h3><i class="fas fa-chart-line" style="color:#4F46E5;margin-right:8px;"></i>近7天销售趋势</h3>
                    <span style="font-size:12px;color:#6B7280;">单位: 元</span>
                </div>
                <div class="card-body">
                    <div class="chart-container" id="chartContainer">
                        <!-- 图表通过JS渲染 -->
                        <div style="display:flex;align-items:flex-end;height:100%;gap:12px;padding:0 4px;" id="chartBars">
                            <!-- JS动态渲染 -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- 最近订单 -->
            <div class="card">
                <div class="card-header">
                    <h3><i class="fas fa-clock" style="color:#4F46E5;margin-right:8px;"></i>最近订单</h3>
                    <button class="btn btn-sm btn-ghost" id="viewAllOrders">
                        查看全部 <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
                <div class="card-body">
                    <ul class="order-list" id="recentOrdersList">
                        <!-- JS动态渲染 -->
                        <li style="text-align:center;padding:20px;color:#9CA3AF;">
                            <i class="fas fa-inbox" style="font-size:32px;display:block;margin-bottom:8px;"></i>
                            暂无订单
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- 快速操作 -->
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-bolt" style="color:#4F46E5;margin-right:8px;"></i>快速操作</h3>
            </div>
            <div class="card-body">
                <div class="quick-actions">
                    <a href="#/02-pos/cash-register" class="quick-action-btn">
                        <i class="fas fa-cash-register"></i>
                        <span>新收银</span>
                    </a>
                    <a href="#/05-customers/customers" class="quick-action-btn">
                        <i class="fas fa-user-plus"></i>
                        <span>新客户</span>
                    </a>
                    <a href="#/07-inventory/low-stock" class="quick-action-btn">
                        <i class="fas fa-box"></i>
                        <span>盘点库存</span>
                    </a>
                    <a href="#/13-analytics/reports" class="quick-action-btn">
                        <i class="fas fa-file-invoice"></i>
                        <span>生成报表</span>
                    </a>
                    <a href="#/15-ai/dashboard" class="quick-action-btn" style="border-color:#7C3AED;">
                        <i class="fas fa-brain" style="color:#7C3AED;"></i>
                        <span>AI分析</span>
                    </a>
                    <a href="#/12-system/backup" class="quick-action-btn">
                        <i class="fas fa-database"></i>
                        <span>数据备份</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================================
    JavaScript
    ============================================================ -->
    <script type="module">
        import { init } from './dashboard.js';

        // DOM 就绪后初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📊 Dashboard HTML 已加载');
            
            // 确保容器存在
            const container = document.getElementById('dashboardContainer');
            if (container) {
                // 调用模块初始化
                init().catch(err => {
                    console.warn('Dashboard 初始化失败，使用降级方案:', err);
                    // 降级方案：填充示例数据
                    renderFallbackData();
                });
            }
        });

        // 降级方案 - 当模块加载失败时显示示例数据
        function renderFallbackData() {
            // 统计卡片
            document.getElementById('todayRevenue').textContent = '¥12,580';
            document.getElementById('todayOrders').textContent = '42';
            document.getElementById('activeCustomers').textContent = '156';
            document.getElementById('conversionRate').textContent = '8.5%';
            document.getElementById('lowStockCount').textContent = '5';
            document.getElementById('currentVehicles').textContent = '8';

            // 图表数据
            const chartData = {
                labels: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'],
                values: [3200, 4500, 3800, 5600, 4900, 7200, 6800]
            };
            renderChart(chartData);

            // 最近订单
            const orders = [
                { id: 'ORD-2024-001', customer: '王小明', amount: 299, status: 'completed', time: '10:30' },
                { id: 'ORD-2024-002', customer: '李小红', amount: 159, status: 'processing', time: '11:20' },
                { id: 'ORD-2024-003', customer: '张伟', amount: 459, status: 'pending', time: '12:15' },
                { id: 'ORD-2024-004', customer: '刘洋', amount: 89, status: 'completed', time: '13:45' },
                { id: 'ORD-2024-005', customer: '陈静', amount: 329, status: 'completed', time: '14:30' }
            ];
            renderOrders(orders);
        }

        function renderChart(data) {
            const container = document.getElementById('chartBars');
            if (!container) return;
            const max = Math.max(...data.values, 1);
            container.innerHTML = data.labels.map((label, i) => {
                const height = (data.values[i] / max) * 150;
                return `
                    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
                        <div style="height:${Math.max(height, 4)}px;width:100%;background:linear-gradient(180deg,#4F46E5,#818CF8);border-radius:4px 4px 0 0;transition:height 0.5s;min-height:4px;"></div>
                        <span style="font-size:11px;color:#6B7280;">${label}</span>
                        <span style="font-size:11px;font-weight:600;color:#1F2937;">${data.values[i]}</span>
                    </div>
                `;
            }).join('');
        }

        function renderOrders(orders) {
            const list = document.getElementById('recentOrdersList');
            if (!list) return;
            const statusMap = {
                completed: { label: '已完成', class: 'completed' },
                pending: { label: '待处理', class: 'pending' },
                processing: { label: '处理中', class: 'processing' },
                cancelled: { label: '已取消', class: 'cancelled' }
            };
            list.innerHTML = orders.map(o => {
                const s = statusMap[o.status] || statusMap.pending;
                return `
                    <li class="order-item">
                        <div class="order-info">
                            <span class="order-id">${o.id}</span>
                            <span class="order-customer">${o.customer} · ${o.time}</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:12px;">
                            <span class="order-amount">¥${o.amount}</span>
                            <span class="order-status ${s.class}">${s.label}</span>
                        </div>
                    </li>
                `;
            }).join('');
        }

        // 刷新按钮事件
        document.getElementById('refreshDashboard')?.addEventListener('click', function() {
            const icon = this.querySelector('i');
            icon.classList.add('fa-spin');
            setTimeout(() => {
                icon.classList.remove('fa-spin');
                document.getElementById('lastUpdate').textContent = '更新于: ' + new Date().toLocaleString();
            }, 1000);
        });
    </script>
</body>
</html>

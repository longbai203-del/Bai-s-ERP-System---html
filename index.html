@"
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BAI ERP - 智能企业管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            max-width: 400px;
            width: 90%;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 12px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 4px;
        }
        p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #e2e8f0;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .tip {
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">🏢</div>
        <h1>BAI ERP</h1>
        <p>智能企业管理系统</p>
        <div class="spinner"></div>
        <div class="tip">正在跳转...</div>
    </div>

    <script>
        (function() {
            // 检查登录状态
            try {
                const user = localStorage.getItem('sb-user');
                if (user) {
                    try {
                        const parsed = JSON.parse(user);
                        if (parsed && parsed.access_token) {
                            window.location.href = '/dashboard.html';
                            return;
                        }
                    } catch (e) {
                        localStorage.removeItem('sb-user');
                    }
                }
                window.location.href = '/login.html';
            } catch (err) {
                window.location.href = '/login.html';
            }
        })();
    </script>

</body>
</html>
"@ | Out-File -FilePath "index.html" -Encoding UTF8

<!-- layouts/sidebar.html - 动态菜单 -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <span style="font-size:24px;">🚗</span>
        <span style="font-weight:700;font-size:18px;margin-left:8px;">BAI ERP</span>
    </div>
    
    <nav class="sidebar-nav" id="sidebar-nav">
        <!-- 菜单由 JavaScript 动态生成 -->
        <div id="menu-container"></div>
    </nav>
</div>

<script type="module">
import { MODULES } from '/config/modules.config.js';

function buildMenu() {
    const container = document.getElementById('menu-container');
    if (!container) return;
    
    let html = '';
    
    for (const [key, module] of Object.entries(MODULES)) {
        html += 
            <div class="sidebar-section">
                <div class="sidebar-section-title"> </div>
        ;
        
        // 子菜单
        for (const child of module.children) {
            const isActive = window.location.search.includes(module=) && 
                           window.location.search.includes(child=);
            html += 
                <a href="?module=&child=" 
                   class="sidebar-item "
                   data-module=""
                   data-child="">
                    
                </a>
            ;
        }
        
        html += </div>;
    }
    
    container.innerHTML = html;
}

// 构建菜单
buildMenu();

// 监听点击事件 - 使用事件委托
document.getElementById('menu-container').addEventListener('click', function(e) {
    const link = e.target.closest('.sidebar-item');
    if (link) {
        e.preventDefault();
        const href = link.getAttribute('href');
        if (href) {
            // 更新URL
            window.history.pushState({}, '', href);
            // 触发模块加载
            window.dispatchEvent(new Event('hashchange'));
        }
    }
});
</script>

<style>
.sidebar-brand {
    display: flex;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid #e2e8f0;
    margin-bottom: 8px;
}

.sidebar-nav {
    overflow-y: auto;
    height: calc(100vh - 140px);
}

.sidebar-section {
    margin-bottom: 4px;
}

.sidebar-section-title {
    font-size: 11px;
    font-weight: 600;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 8px 16px 4px;
}

.sidebar-item {
    display: block;
    padding: 8px 16px 8px 24px;
    color: #475569;
    text-decoration: none;
    font-size: 14px;
    transition: all 0.2s;
    border-left: 3px solid transparent;
    cursor: pointer;
}

.sidebar-item:hover {
    background: #f1f5f9;
    color: #2563eb;
    border-left-color: #2563eb;
}

.sidebar-item.active {
    background: #eff6ff;
    color: #2563eb;
    border-left-color: #2563eb;
    font-weight: 500;
}
</style>

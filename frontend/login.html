<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAI ERP - 登录</title>
    <link rel="stylesheet" href="/assets/css/variables.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin: 0;
        }
        
        .login-header .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-top: 4px;
        }
        
        .login-header .version {
            display: inline-block;
            background: #f1f5f9;
            color: #64748b;
            font-size: 12px;
            padding: 2px 12px;
            border-radius: 12px;
            margin-top: 8px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-weight: 500;
            color: #334155;
            margin-bottom: 6px;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
        }
        
        .form-options label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #64748b;
            cursor: pointer;
        }
        
        .form-options a {
            color: #667eea;
            text-decoration: none;
        }
        
        .form-options a:hover {
            text-decoration: underline;
        }
        
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-msg {
            color: #ef4444;
            font-size: 14px;
            margin-top: 12px;
            display: none;
            padding: 8px 12px;
            background: #fef2f2;
            border-radius: 6px;
            border: 1px solid #fecaca;
        }
        
        .error-msg.show {
            display: block;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            font-size: 12px;
            color: #94a3b8;
        }
        
        .login-footer .links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 8px;
        }
        
        .login-footer .links a {
            color: #94a3b8;
            text-decoration: none;
        }
        
        .login-footer .links a:hover {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>BAI ERP</h1>
            <div class="subtitle">智能洗车·企业管理平台</div>
            <span class="version">v1.0.0</span>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">邮箱地址</label>
                <input type="email" id="email" placeholder="请输入您的邮箱" value="admin@example.com">
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入您的密码" value="password123">
            </div>
            
            <div class="form-options">
                <label>
                    <input type="checkbox" id="remember"> 记住我
                </label>
                <a href="#">忘记密码？</a>
            </div>
            
            <button type="submit" class="btn-login" id="loginBtn">登录</button>
            
            <div class="error-msg" id="errorMsg"></div>
        </form>
        
        <div class="login-footer">
            <div>© 2026 BAI ERP · 基于 Supabase</div>
            <div class="links">
                <a href="#">隐私政策</a>
                <a href="#">服务条款</a>
                <a href="#">帮助中心</a>
            </div>
        </div>
    </div>
    
    <script>
        // 登录逻辑 - 简洁无语法错误
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 BAI ERP 登录页面已加载');
            
            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                console.log('🔑 登录按钮被点击');
                
                const email = emailInput.value.trim();
                const password = passwordInput.value.trim();
                
                // 验证
                if (!email || !password) {
                    errorMsg.textContent = '请输入邮箱和密码';
                    errorMsg.classList.add('show');
                    return;
                }
                
                if (!email.includes('@')) {
                    errorMsg.textContent = '请输入有效的邮箱地址';
                    errorMsg.classList.add('show');
                    return;
                }
                
                // 隐藏错误信息
                errorMsg.classList.remove('show');
                
                // 显示加载状态
                loginBtn.textContent = '登录中...';
                loginBtn.disabled = true;
                
                // 模拟登录（演示用）
                setTimeout(function() {
                    console.log('✅ 登录成功，跳转到仪表盘');
                    // 跳转到仪表盘
                    window.location.href = '/dashboard.html';
                }, 1500);
            });
            
            // 输入时隐藏错误
            emailInput.addEventListener('input', function() {
                errorMsg.classList.remove('show');
            });
            
            passwordInput.addEventListener('input', function() {
                errorMsg.classList.remove('show');
            });
            
            console.log('✅ 登录表单已初始化');
        });
    </script>
</body>
</html>

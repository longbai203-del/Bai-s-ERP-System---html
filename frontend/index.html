<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAI ERP ??????</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; color: #1e293b; height: 100vh; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100vh; }

        #navbar { height: 60px; background: #fff; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; padding: 0 24px; z-index: 100; flex-shrink: 0; }
        .navbar-brand { font-size: 20px; font-weight: 700; color: #2563eb; }
        .navbar-brand span { color: #1e293b; font-weight: 400; }
        .navbar-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
        .logout-btn { padding: 6px 16px; border: none; background: #ef4444; color: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .logout-btn:hover { background: #dc2626; }

        .main-wrapper { display: flex; flex: 1; overflow: hidden; }

        #sidebar-container { width: 240px; background: #fff; border-right: 1px solid #e2e8f0; overflow-y: auto; padding: 8px 0; flex-shrink: 0; }
        #sidebar-container::-webkit-scrollbar { width: 4px; }
        #sidebar-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        .menu-item { border-bottom: 1px solid #f1f5f9; }
        .menu-header { display: flex; align-items: center; padding: 10px 16px; gap: 10px; font-weight: 500; font-size: 14px; color: #1e293b; cursor: pointer; user-select: none; transition: background 0.15s; }
        .menu-header:hover { background: #f8fafc; }
        .menu-header .arrow { margin-left: auto; font-size: 12px; color: #94a3b8; transition: transform 0.3s; }
        .menu-header .arrow.open { transform: rotate(90deg); }
        .menu-header.active { background: #eff6ff; color: #2563eb; }

        .menu-children { overflow: hidden; max-height: 0; transition: max-height 0.3s ease; }
        .menu-children.open { max-height: 800px; }
        .menu-child { padding: 7px 16px 7px 48px; font-size: 13px; color: #64748b; cursor: pointer; transition: background 0.15s; border-left: 3px solid transparent; }
        .menu-child:hover { background: #f8fafc; color: #1e293b; }
        .menu-child.active { background: #eff6ff; color: #2563eb; border-left-color: #2563eb; font-weight: 500; }

        #main-content { flex: 1; padding: 24px; overflow-y: auto; background: #f8fafc; }
        .loading { display: flex; justify-content: center; align-items: center; min-height: 400px; flex-direction: column; gap: 16px; }
        .spinner { width: 48px; height: 48px; border: 4px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            #sidebar-container { width: 0; padding: 0; border: none; }
            #sidebar-container.open { width: 260px; padding: 8px 0; border-right: 1px solid #e2e8f0; position: fixed; top: 60px; left: 0; bottom: 0; z-index: 99; background: #fff; box-shadow: 4px 0 20px rgba(0,0,0,0.08); }
            #main-content { padding: 16px; }
            .sidebar-toggle { display: flex !important; }
        }
        .sidebar-toggle { display: none; background: none; border: none; font-size: 22px; cursor: pointer; padding: 4px 8px; border-radius: 6px; color: #475569; }
        .sidebar-toggle:hover { background: #f1f5f9; }
        .sidebar-overlay { display: none; position: fixed; top: 60px; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 98; }
        .sidebar-overlay.show { display: block; }
    </style>
</head>
<body>

<div id="app">
    <div id="navbar">
        <button class="sidebar-toggle" id="sidebarToggle">?</button>
        <div class="navbar-brand">?? BAI <span>ERP</span></div>
        <div class="navbar-right">
            <span id="userName">???</span>
            <button class="logout-btn" id="logoutBtn">??</button>
        </div>
    </div>
    <div class="main-wrapper">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <div id="sidebar-container"></div>
        <div id="main-content">
            <div class="loading"><div class="spinner"></div><span>???...</span></div>
        </div>
    </div>
</div>

<script type="module" src="core/auth.js"></script>
<script type="module" src="core/app.js"></script>

<script>
    document.getElementById('logoutBtn').addEventListener('click', function() {
        localStorage.clear();
        window.location.href = '/login.html';
    });

    document.getElementById('sidebarToggle').addEventListener('click', function() {
        document.getElementById('sidebar-container').classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('show');
    });
    document.getElementById('sidebarOverlay').addEventListener('click', function() {
        document.getElementById('sidebar-container').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('show');
    });
</script>

</body>
</html>
